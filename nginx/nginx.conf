# =========================================================================
# 文件作用：Nginx 生产环境配置文件，包含静态资源托管、反向代理及基础限流
# 创建时间：2026-03-15
# 修改日志：
#   2026-03-15: 初始创建
# =========================================================================

# 定义请求限制区域 (基于客户端IP，每秒最多处理2个请求，主要防止API被滥用)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;

server {
    listen 80;
    server_name localhost;

    # 关闭服务器版本显示，增加安全性
    server_tokens off;

    # =====================================================================
    # 1. 静态资源托管 (前端Vue项目构建后的产物)
    # =====================================================================
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # 支持 Vue 单页应用的 history 路由模式 (如果未来加入vue-router)
        try_files $uri $uri/ /index.html;
    }

    # =====================================================================
    # 2. 反向代理到后端API (FastAPI)
    # =====================================================================
    location /api/ {
        # 启用请求限流，burst=5 允许短暂的突发流量(5个请求排队)，nodelay 则直接拒绝超过突发限制的请求
        limit_req zone=api_limit burst=5 nodelay;
        
        # 将请求转发至名为 backend 的容器的 8000 端口
        proxy_pass http://backend:8000/api/;
        
        # 设置请求头，将真实的客户端信息传递给后端
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 调整上传文件大小限制为 20MB，满足 PDF 合同上传需求
        client_max_body_size 20M;
        
        # 延长后端响应的超时时间，因为大模型生成审核报告可能耗时较长
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # =====================================================================
    # 3. 自定义错误页面
    # =====================================================================
    error_page 503 @503;
    location @503 {
        default_type application/json;
        return 503 '{"error": "服务访问过于频繁，请稍后再试（被Nginx限流）"}';
    }
}